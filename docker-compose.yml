services:
  postgres:
    image: postgres:16-alpine
    container_name: transfers-postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: transfers
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d transfers"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
